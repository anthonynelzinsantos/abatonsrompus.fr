{{ define "main" }}
	<h1 class="title">{{ .Title | markdownify }}</h1>
	<time class="time" datetime="{{ .PublishDate }}">{{ .PublishDate | time.Format ":date_long" }}</time>
	
	<div class="content">
		{{ .Content }}
	</div>
	
	<div class="embed">
		<iframe src="{{ .Params.Embed }}?subscribe=false" frameBorder="0" width="100%" height="100px"></iframe>
	</div>
{{ end }}
